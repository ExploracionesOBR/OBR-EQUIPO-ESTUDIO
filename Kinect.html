<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Detector SLS Pro V36</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            color: #22c55e;
            user-select: none;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100dvh;
            background: #050505;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .crt-overlay {
            pointer-events: none;
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            opacity: 0.15;
            z-index: 10;
        }

        .glass {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .recording-pulse {
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        @media (orientation: landscape) {
            #tech-panel { max-width: 300px; left: 1.5rem; bottom: 1.5rem; transform: none; }
            #action-group { right: 2rem; bottom: 1.5rem; flex-direction: column; left: auto; width: auto; transform: none; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- El video debe estar oculto pero presente para la captura -->
        <video id="webcam" autoplay playsinline muted style="display:none"></video>
        <canvas id="mainCanvas"></canvas>
        <div class="crt-overlay"></div>

        <!-- HUD Superior -->
        <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none z-30">
            <div class="flex flex-col gap-3">
                <div class="glass px-4 py-2 rounded-2xl flex items-center gap-3 shadow-lg">
                    <div id="ai-status-led" class="w-3 h-3 bg-red-600 rounded-full shadow-[0_0_8px_rgba(220,38,38,0.5)]"></div>
                    <span class="text-[11px] font-black tracking-widest text-white uppercase" id="status-text">Sincronizando Core...</span>
                </div>
                <div id="rec-indicator" class="hidden flex flex-col items-center">
                     <div class="bg-red-600/30 px-5 py-2 border border-red-500/50 rounded-full flex items-center gap-3 backdrop-blur-md">
                        <div class="w-3 h-3 bg-red-600 rounded-full recording-pulse"></div>
                        <span class="text-[16px] font-black text-white" id="rec-timer">00:00</span>
                     </div>
                </div>
                <div id="pwa-status" class="text-[8px] bg-white/5 px-3 py-1 rounded-full text-white/40 uppercase font-bold tracking-widest opacity-0">
                    Conexión Local Establecida
                </div>
            </div>
            
            <div class="glass px-4 py-2 rounded-2xl flex items-center gap-2 pointer-events-auto shadow-lg">
                <svg id="mic-icon" class="w-4 h-4 text-white/20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                <span class="text-[9px] font-bold text-white/40 uppercase tracking-widest">Audio_HQ</span>
            </div>
        </div>

        <!-- Controles Inferiores -->
        <div id="tech-panel" class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[90%] max-w-[440px] glass p-5 rounded-[2.5rem] z-30 pointer-events-auto">
            <div class="flex items-center justify-between mb-4 px-2">
                <div class="flex items-center gap-2 text-[10px] font-black text-green-400 uppercase">
                    <svg class="w-3 h-3 animate-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    ISO: <span id="iso-val">----</span>
                </div>
                <div class="text-[8px] font-black text-white/30 uppercase tracking-[0.3em]" id="backend-label">SLS_PROC_CORE</div>
            </div>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setFilter('NVG')" class="filter-btn py-3 rounded-2xl border border-white/40 bg-white/10 text-white text-[10px] font-black uppercase transition-all" data-mode="NVG">NVG</button>
                <button onclick="setFilter('THERMAL')" class="filter-btn py-3 rounded-2xl border border-white/5 text-white/20 text-[10px] font-black uppercase transition-all" data-mode="THERMAL">Term</button>
                <button onclick="setFilter('GHOST')" class="filter-btn py-3 rounded-2xl border border-white/5 text-white/20 text-[10px] font-black uppercase transition-all" data-mode="GHOST">Fant</button>
                <button onclick="setFilter('DAYLIGHT')" class="filter-btn py-3 rounded-2xl border border-white/5 text-white/20 text-[10px] font-black uppercase transition-all" data-mode="DAYLIGHT">Día</button>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div id="action-group" class="absolute bottom-6 left-0 w-full flex justify-center items-center gap-10 pointer-events-none z-30">
            <button id="photoBtn" class="pointer-events-auto w-16 h-16 rounded-full glass border border-white/20 flex items-center justify-center text-white active:scale-75 shadow-2xl transition-all">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
            </button>
            <button id="recBtn" class="pointer-events-auto w-24 h-24 rounded-full border-8 border-white/5 bg-zinc-950/95 text-red-600 flex flex-col items-center justify-center active:scale-90 shadow-2xl transition-all">
                <div id="rec-icon" class="w-10 h-10 bg-red-600 rounded-lg shadow-lg"></div>
                <span id="rec-text" class="text-[9px] mt-2 font-black tracking-widest uppercase">REC</span>
            </button>
        </div>

        <!-- Pantalla de Error Crítico -->
        <div id="error-screen" class="hidden absolute inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-12 text-center backdrop-blur-3xl">
            <svg class="w-20 h-20 text-red-600 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <h2 class="text-3xl font-black uppercase text-red-600 italic tracking-tighter">FALLO_SISTEMA</h2>
            <p class="text-[11px] text-zinc-500 mb-10 uppercase font-bold tracking-widest leading-relaxed max-w-xs" id="error-msg"></p>
            <button onclick="location.reload()" class="bg-red-700 text-white px-14 py-6 rounded-3xl font-black text-[12px] uppercase tracking-[0.4em]">REINTENTAR</button>
        </div>
    </div>

    <!-- Scripts de TensorFlow.js con carga forzada -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-js/tfjs-backend-webgl@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-js/tfjs-backend-wasm@4.10.0/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-js/tfjs-backend-cpu@4.10.0"></script>

    <script>
        // --- FILTRO KALMAN PARA SUAVIZADO ---
        class JointKalman {
            constructor() {
                this.x = 0; this.y = 0; this.vx = 0; this.vy = 0;
                this.gain = 0.75;
                this.initialized = false;
            }
            update(nx, ny) {
                if (!this.initialized) {
                    this.x = nx; this.y = ny;
                    this.initialized = true; return;
                }
                const px = this.x + this.vx;
                const py = this.y + this.vy;
                const dx = nx - px; const dy = ny - py;
                this.x = px + dx * this.gain;
                this.y = py + dy * this.gain;
                this.vx = dx * 0.35; this.vy = dy * 0.35;
            }
            get() { return { x: this.x, y: this.y }; }
        }

        const MAX_LIFE = 8000;
        const MISSED_FRAME_LIMIT = 45; 
        const AI_W = 256; const AI_H = 144;

        let detector, mediaRecorder, audioStream, ctx;
        let skeletons = [];
        let filterMode = 'NVG';
        let isoLevel = 3200;
        let isRecording = false;
        let lastAiTime = 0;
        let aiBusy = false;
        let isCameraReady = false;
        let chunks = [];
        let recStartTime = 0;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('mainCanvas');
        const aiCanvas = document.createElement('canvas');
        const aiCtx = aiCanvas.getContext('2d', { alpha: false });

        // --- PWA SILENCIOSO ---
        async function initPWA() {
            if ('serviceWorker' in navigator) {
                const isSecure = location.protocol === 'https:' || location.hostname === 'localhost';
                if (isSecure) {
                    try {
                        await navigator.serviceWorker.register('sw.js');
                        const status = document.getElementById('pwa-status');
                        status.style.opacity = "1";
                        setTimeout(() => status.style.opacity = "0", 3000);
                    } catch (e) {
                        console.log("PWA Skip: Entorno protegido o restringido.");
                    }
                }
            }
        }

        // --- PIPELINE DE INICIALIZACIÓN FORZADO ---
        async function setupEngine() {
            await tf.ready();
            const engines = ['webgl', 'wasm', 'cpu'];
            for (const engine of engines) {
                try {
                    await tf.setBackend(engine);
                    console.log("Motor IA activo:", engine);
                    if (engine === 'webgl') {
                        tf.env().set('WEBGL_FORCE_F16_TEXTURES', true);
                        tf.env().set('WEBGL_PACK', true);
                    }
                    return engine;
                } catch (e) {
                    console.warn(`Motor ${engine} falló, reintentando...`);
                }
            }
            throw new Error("No se pudo inicializar ningún motor de IA compatible.");
        }

        async function init() {
            try {
                const status = document.getElementById('status-text');
                
                initPWA();
                
                // 1. Iniciar TF
                const activeBackend = await setupEngine();
                document.getElementById('backend-label').innerText = activeBackend.toUpperCase() + "_CORE_V36";

                // 2. Cargar MoveNet
                status.innerText = "Cargando Sensores...";
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet,
                    { 
                        modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
                        enableSmoothing: true,
                        multiPoseMaxDetections: 6 
                    }
                );

                // 3. Calentamiento (Warm-up)
                await tf.tidy(() => {
                    const warmup = tf.zeros([1, 192, 192, 3]);
                    return detector.estimatePoses(warmup);
                });

                document.getElementById('ai-status-led').className = "w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]";
                status.innerText = "SENSOR_SLS_ACTIVO";

                ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
                
                await startCamera();
                requestAnimationFrame(renderLoop);

            } catch (err) { showError(err.message); }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } },
                    audio: { echoCancellation: false, autoGainControl: true }
                });
                video.srcObject = stream;
                audioStream = stream;
                document.getElementById('mic-icon').classList.replace('text-white/20', 'text-green-500');
                
                return new Promise(r => video.onloadedmetadata = () => { 
                    video.play(); 
                    isCameraReady = true;
                    r(); 
                });
            } catch (e) { showError("Acceso a Cámara Denegado."); }
        }

        // --- LÓGICA DE DETECCIÓN Y RASTREO ---
        function getTorsoCenter(kp) {
            let sx=0, sy=0, c=0;
            [5, 6, 11, 12].forEach(i => {
                if (kp[i].score > 0.1) { sx += kp[i].x; sy += kp[i].y; c++; }
            });
            return c >= 2 ? { x: sx/c, y: sy/c, count: c } : null;
        }

        async function processAI() {
            if (!detector || !isCameraReady || aiBusy || video.readyState < 2) return;
            aiBusy = true;

            await tf.tidy(async () => {
                aiCtx.drawImage(video, 0, 0, AI_W, AI_H);
                
                // Muestreo ISO
                const px = aiCtx.getImageData(0,0,AI_W,AI_H).data;
                let lum=0; for(let i=0;i<px.length;i+=800) lum+=(px[i]*0.3+px[i+1]*0.6+px[i+2]*0.1);
                const avg = lum / (px.length/800);
                isoLevel += (Math.max(800, Math.min(12800, 3200 * (128/(avg+1)))) - isoLevel) * 0.05;
                document.getElementById('iso-val').innerText = Math.round(isoLevel);

                const poses = await detector.estimatePoses(aiCanvas);
                updateSkeletons(poses);
            });
            aiBusy = false;
        }

        function updateSkeletons(newPoses) {
            const now = performance.now();
            skeletons.forEach(s => {
                s.missedFrames++;
                s.life -= Math.min(40, now - s.lastUpdate);
                s.lastUpdate = now;
            });

            newPoses.forEach(pose => {
                const kp = pose.keypoints;
                let sx=0, sy=0, c=0;
                [5, 6, 11, 12].forEach(i => { if (kp[i].score > 0.1) { sx += kp[i].x; sy += kp[i].y; c++; }});
                if (c < 2 && pose.score < 0.1) return;
                const tc = { x: sx/c, y: sy/c };

                let match = skeletons.find(s => {
                    const sc = s.tc;
                    const d = Math.sqrt(Math.pow(sc.x - tc.x, 2) + Math.pow(sc.y - tc.y, 2));
                    return d < 70; 
                });

                if (match) {
                    match.life = MAX_LIFE;
                    match.missedFrames = 0;
                    match.tc = tc;
                    match.score = pose.score;
                    pose.keypoints.forEach((p, i) => {
                        match.filters[i].update(p.x, p.y);
                        const f = match.filters[i].get();
                        match.keypoints[i].x = f.x;
                        match.keypoints[i].y = f.y;
                        match.keypoints[i].score = p.score;
                    });
                } else {
                    const newS = {
                        id: Math.random(),
                        keypoints: JSON.parse(JSON.stringify(pose.keypoints)),
                        filters: Array.from({length: 17}, () => new JointKalman()),
                        tc: tc,
                        life: MAX_LIFE,
                        missedFrames: 0,
                        lastUpdate: now,
                        score: pose.score
                    };
                    pose.keypoints.forEach((p, i) => newS.filters[i].update(p.x, p.y));
                    skeletons.push(newS);
                }
            });
            skeletons = skeletons.filter(s => s.life > 0 && s.missedFrames < MISSED_FRAME_LIMIT);
        }

        // --- BUCLE DE RENDERIZADO (PRIORIDAD VIDEO) ---
        function renderLoop() {
            if (video.readyState >= 2 && isCameraReady) {
                const now = performance.now();
                
                // Forzar ajuste de canvas al tamaño del video
                if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }

                const scaleX = canvas.width / AI_W;
                const scaleY = canvas.height / AI_H;

                // 1. DIBUJAR VIDEO (CAPA 0 - FONDO)
                const b = (isoLevel / 2500) + 0.1;
                ctx.save();
                let fStr = "";
                switch(filterMode) {
                    case 'NVG': fStr = `brightness(${b}) contrast(1.8) grayscale(1) sepia(1) hue-rotate(85deg)`; break;
                    case 'THERMAL': fStr = `brightness(${b}) contrast(1.2) grayscale(0.2)`; break;
                    case 'GHOST': fStr = `brightness(${b}) contrast(1.6) invert(1) hue-rotate(180deg)`; break;
                    default: fStr = `brightness(${b}) contrast(1.5)`;
                }
                ctx.filter = fStr;
                // Dibujo forzado del video
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                // 2. EFECTO TÉRMICO OVERLAY
                if (filterMode === 'THERMAL') {
                    ctx.save();
                    ctx.globalCompositeOperation = 'overlay';
                    ctx.globalAlpha = 0.4;
                    ctx.filter = 'contrast(2) saturate(4) hue-rotate(-130deg)';
                    ctx.drawImage(canvas, 0, 0);
                    ctx.restore();
                }

                // 3. PROCESAR IA (~30 FPS)
                if (now - lastAiTime > 30) { lastAiTime = now; processAI(); }

                // 4. DIBUJAR ESQUELETOS (CAPA 1)
                skeletons.forEach(s => {
                    const color = filterMode === 'GHOST' ? '#00ffff' : '#d946ef';
                    const kp = s.keypoints;
                    ctx.save();
                    ctx.globalAlpha = Math.min(1, s.life / 2000);
                    ctx.strokeStyle = color; ctx.fillStyle = color;
                    ctx.lineWidth = Math.max(6, canvas.width / 300);
                    ctx.lineCap = 'round'; ctx.shadowBlur = 20; ctx.shadowColor = color;

                    // Dibujo de Huesos
                    [[5,7],[7,9],[6,8],[8,10],[11,13],[13,15],[12,14],[14,16]].forEach(([i, j]) => {
                        if (kp[i].score > 0.05 && kp[j].score > 0.05) {
                            ctx.beginPath(); 
                            ctx.moveTo(kp[i].x*scaleX, kp[i].y*scaleY); 
                            ctx.lineTo(kp[j].x*scaleX, kp[j].y*scaleY);
                            ctx.stroke();
                        }
                    });

                    // Estructura Kinect
                    const n=kp[0], sL=kp[5], sR=kp[6], hL=kp[11], hR=kp[12];
                    const neckX = (sL.x + sR.x)/2; const neckY = (sL.y + sR.y)/2;
                    const hipX = (hL.x + hR.x)/2; const hipY = (hL.y + hR.y)/2;
                    ctx.beginPath(); ctx.moveTo(n.x*scaleX, n.y*scaleY); ctx.lineTo(neckX*scaleX, neckY*scaleY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(sL.x*scaleX, sL.y*scaleY); ctx.lineTo(neckX*scaleX, neckY*scaleY); ctx.lineTo(sR.x*scaleX, sR.y*scaleY); ctx.stroke();
                    ctx.setLineDash([15, 12]);
                    ctx.beginPath(); ctx.moveTo(neckX*scaleX, neckY*scaleY); ctx.lineTo(hipX*scaleX, hipY*scaleY); ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.beginPath(); ctx.moveTo(hL.x*scaleX, hL.y*scaleY); ctx.lineTo(hipX*scaleX, hipY*scaleY); ctx.lineTo(hR.x*scaleX, hR.y*scaleY); ctx.stroke();

                    ctx.font = 'bold 22px monospace';
                    ctx.fillText(`ANOMALÍA_${Math.round(s.score*100)}%`, n.x*scaleX - 50, n.y*scaleY - 80);
                    ctx.restore();
                });

                // 5. HUD TELEMETRÍA (CAPA 2)
                drawHUD(ctx);
            }
            requestAnimationFrame(renderLoop);
        }

        function drawHUD(ctx) {
            const bW = 340, bH = 210, m = canvas.width - bW - 40, HUD_TOP = 100;
            ctx.fillStyle = 'rgba(10, 20, 10, 0.98)'; ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.roundRect(m, HUD_TOP, bW, bH, 25); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#22c55e'; ctx.font = 'bold 16px monospace';
            ctx.fillText(`TELEMETRÍA_OBR_V36`, m + 25, HUD_TOP + 40);
            ctx.fillRect(m + 25, HUD_TOP + 50, bW - 50, 2);
            const emf = 0.15 + (skeletons.length * (Math.random() * 4.5));
            const temp = 22.4 - (skeletons.length * 2.2);
            ctx.font = '14px monospace';
            ctx.fillText(`CAMPO_EMF:  ${emf.toFixed(2)} mG`, m + 25, HUD_TOP + 85);
            ctx.fillText(`PUNTO_FRÍO: ${temp.toFixed(1)}°C`, m + 25, HUD_TOP + 120);
            ctx.fillText(`SEÑAL_KV:   ${Math.round(96+Math.random()*3)}%`, m + 25, HUD_TOP + 155);
            ctx.fillStyle = skeletons.length > 0 ? '#ff00ff' : '#22c55e';
            ctx.fillText(`RASTREO_SLS: ${skeletons.length} DETECTADAS`, m + 25, HUD_TOP + 190);
        }

        function setFilter(mode) {
            filterMode = mode;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.mode === mode;
                btn.className = `filter-btn flex-1 py-3 text-[10px] border rounded-2xl uppercase font-black transition-all ${isActive ? 'bg-white/10 border-white text-white' : 'border-white/5 text-white/20'}`;
            });
        }

        document.getElementById('photoBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `SLS_PHOTO_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        };

        document.getElementById('recBtn').onclick = () => {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('rec-indicator').classList.add('hidden');
                document.getElementById('rec-icon').className = "w-10 h-10 bg-red-600 rounded-lg";
                document.getElementById('rec-text').innerText = "REC";
            } else {
                chunks = [];
                let mime = 'video/mp4;codecs=h264';
                if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8,opus';
                const stream = canvas.captureStream(30);
                const combined = new MediaStream([...stream.getTracks(), ...audioStream.getAudioTracks()]);
                mediaRecorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 18000000 });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const ext = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = `SLS_EVIDENCIA_${Date.now()}.${ext}`; a.click();
                };
                mediaRecorder.start();
                isRecording = true; recStartTime = Date.now();
                document.getElementById('rec-indicator').classList.remove('hidden');
                document.getElementById('rec-icon').className = "w-8 h-8 bg-white rounded-lg";
                document.getElementById('rec-text').innerText = "STOP";
            }
        };

        setInterval(() => {
            if(isRecording) {
                const d = Math.floor((Date.now() - recStartTime) / 1000);
                document.getElementById('rec-timer').innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`;
            }
        }, 1000);

        function showError(msg) {
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
        }

        window.onload = init;
    </script>
</body>
</html>
